version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/officium-web"
    schedule:
      interval: "weekly"
    groups:
      web-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/vscode"
    schedule:
      interval: "weekly"
    groups:
      vscode-dependencies:
        patterns:
          - "*"
