name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89
        with:
          args: "check"
      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89
        with:
          args: "format --check"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
      - run: uv sync
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
      - run: uv sync
      - run: uv run pytest tests/ -q --cov=agents --cov=shared --cov=logos --cov-report=term --cov-report=json:coverage.json --cov-report=xml:coverage.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.xml
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        if: >-
          always() &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: ./coverage.xml
          flags: python
          name: hapax-officium-python
          fail_ci_if_error: false
          use_oidc: true

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: officium-web
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: officium-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  vscode-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: vscode/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: "1.25.x"
      - name: Run Gitleaks
        run: |
          tmp="$RUNNER_TEMP/gitleaks-source"
          mkdir -p "$tmp"
          git ls-files -z | rsync --files-from=- --from0 -a ./ "$tmp"/
          go run github.com/zricethezav/gitleaks/v8@latest dir --redact --verbose "$tmp"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Run Bandit security scan
        run: bandit -r . -x ./tests,./officium-web,./vscode --severity-level medium -f json -o bandit-report.json || true
      - name: Check for high-severity findings
        run: |
          if command -v jq &>/dev/null; then
            HIGH=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-report.json 2>/dev/null || echo 0)
            if [ "$HIGH" -gt 0 ]; then
              echo "::error::Bandit found $HIGH high-severity security issues"
              jq '.results[] | select(.issue_severity == "HIGH") | "\(.filename):\(.line_number) \(.issue_text)"' bandit-report.json
              exit 1
            fi
          fi
          echo "No high-severity security issues found"

  all-green:
    name: all-green
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - web-build
      - vscode-build
      - secrets-scan
      - security
    if: always()
    steps:
      - name: Require required jobs to pass
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [ "$RESULTS" != "success,success,success,success,success,success,success" ]; then
            echo "::error::Required job results: $RESULTS"
            exit 1
          fi
